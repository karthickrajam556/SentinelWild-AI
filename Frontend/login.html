<!DOCTYPE html>
   <html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <!--=============== REMIXICONS ===============-->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css">

      <!--=============== CSS ===============-->
      <link rel="stylesheet" href="login.css">
      
      <title>login and registration form - Bedimcode</title>
   </head>
   <body>
      <!--=============== LOGIN IMAGE ===============-->
      <svg class="login__blob" viewBox="0 0 566 640" xmlns="http://www.w3.org/2000/svg">
         <mask id="mask0" mask-type="alpha">
            <path d="M342.407 73.6315C388.53 56.4007 394.378 17.3643 391.538 
            0H566V840H0C14.5385 834.991 100.266 804.436 77.2046 707.263C49.6393 
            591.11 115.306 518.927 176.468 488.873C363.385 397.026 156.98 302.824 
            167.945 179.32C173.46 117.209 284.755 95.1699 342.407 73.6315Z"/>
         </mask>
      
         <g mask="url(#mask0)">
            <path d="M342.407 73.6315C388.53 56.4007 394.378 17.3643 391.538 
            0H566V840H0C14.5385 834.991 100.266 804.436 77.2046 707.263C49.6393 
            591.11 115.306 518.927 176.468 488.873C363.385 397.026 156.98 302.824 
            167.945 179.32C173.46 117.209 284.755 95.1699 342.407 73.6315Z"/>
      
            <!-- Insert your image (recommended size: 1000 x 1200) -->
            <image class="login__img" href="Animal detection images/loginbackground.png.jpeg" />
         </g>
      </svg>      

      <!--=============== LOGIN ===============-->
      <div class="login grid" id="loginAccessRegister">
         <!--===== LOGIN ACCESS =====-->
         <div class="login__access">
            <h1 class="login__title" style="text-align: center;">Welcome Back</h1>
            
            <div class="login__area">
               <form id="loginForm" class="login__form">
                  <div class="login__content grid">
                   
                    <div class="role" style="margin-left: 20px;">
                        <label style="margin-right: 20px;">ROLE : </label>

                        <input type="radio" id="loginForest" name="loginRole" value="forest">
                        <label for="loginForest" style="margin-right: 40px;">Forest Department</label>

                        <input type="radio" id="loginAdmin" name="loginRole" value="admin">
                        <label for="loginAdmin">Admin</label>
                     </div>

                     <div class="login__box">
                        
                        <input type="email" id="email" required placeholder=" " class="login__input">
                        <label for="email" class="login__label">Email</label>
            
                        <i class="ri-mail-fill login__icon"></i>
                     </div>
         
                     <div class="login__box">
                        <input type="password" id="password" required placeholder=" " class="login__input">
                        <label for="password" class="login__label">Password</label>
            
                        <i class="ri-eye-off-fill login__icon login__password" id="loginPassword"></i>
                     </div>
                  </div>
         
                  <a href="#" class="login__forgot">Forgot your password?</a>

                  <!-- CAPTCHA IMAGE -->
                  <div class="captcha-container" style="margin-left:120px;">
                     <img id="captchaImage" alt="Captcha" style="width: 200px;">
                     <button type="button" class="captcha-refresh" onclick="refreshCaptcha()">↻</button>
                  </div>

                  <!-- CAPTCHA INPUT -->
                  <div class="login__box captcha-input-box">
                     <input type="text" id="captchaInput" required placeholder=" " class="login__input">
                     <label for="captchaInput" class="login__label">Enter Captcha</label>
                  </div>

                  <button type="submit" class="login__button">Login</button>
               </form>
      
               
               <p class="login__switch">
                  Don't have an account? 
                  <button id="loginButtonRegister">Create Account</button>
               </p>
            </div>
         </div>

<!--===== LOGIN REGISTER =====-->
<div class="login__register">
   <h1 class="login__title" style="text-align: center;">Create new account</h1>

      <div class="role" style="margin-left: 90px; margin-bottom:20px;">
                     <form>
                          <label style="margin-right: 20px;">ROLE : </label>

                           <input type="radio" id="registerForest" name="registerRole" value="forest">
                           <label for="registerForest" style="margin-right: 40px;">Forest Department</label>

                           <input type="radio" id="registerAdmin" name="registerRole" value="admin">
                           <label for="registerAdmin">Admin</label>
                     </form>
                    </div>

   <div class="login__area">
      <form id="registerForm" class="login__form">

         <div class="login__content grid">

            <div class="login__group grid">
               <div class="login__box">
                  <input type="text" id="name" required placeholder=" " class="login__input">
                  <label for="name" class="login__label">Name</label>
                  <i class="ri-id-card-fill login__icon"></i>
               </div>

               <div class="login__box">
                  <input type="text" id="surname" required placeholder=" " class="login__input">
                  <label for="surname" class="login__label">Surname</label>
                  <i class="ri-id-card-fill login__icon"></i>
               </div>
            </div>

            <div class="login__box">
               <input type="email" id="emailRegister" required placeholder=" " class="login__input">
               <label for="emailRegister" class="login__label">Email</label>
               <i class="ri-mail-fill login__icon"></i>
            </div>

            <div class="login__box">
               <input type="password" id="passwordRegister" required placeholder=" " class="login__input">
               <label for="passwordRegister" class="login__label">Password</label>
               <i class="ri-eye-off-fill login__icon login__password" id="loginPasswordCreate"></i>
            </div>

            <div class="password-rules">
               <p>Password must contain:</p>
               <ul>
                  <li id="ruleLength">Minimum 8 characters</li>
                  <li id="ruleUpper">At least 1 uppercase letter</li>
                  <li id="ruleNumber">At least 1 number</li>
               </ul>
            </div>

            <div class="login__box">
               <input type="password" id="confirmPassword" required placeholder=" " class="login__input">
               <label for="confirmPassword" class="login__label">Confirm Password</label>
               <i class="ri-eye-off-fill login__icon login__password" id="confirmPasswordEye"></i>
            </div>

         </div>

         <button type="submit" class="login__button">Create account</button>

         <p class="login__switch">
            Already have an account?
            <button id="loginButtonAccess">Log In</button>
         </p>

      </form>
   </div>
</div>
      
      <!--=============== MAIN JS ===============-->
      <script src="login.js"></script>
   </body>
</html>
